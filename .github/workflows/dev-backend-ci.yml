name: Backend Dev CI

# 1. When should this run?
on:
#  push:
#    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

# 2. What should it do?
jobs:
  build-backend:
    name: Build and Test Spring Boot
    runs-on: ubuntu-latest

    steps:
      # Step A: Grab your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Set up the Java environment
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Change this to '21' if your project uses Java 21
          distribution: 'temurin'
          cache: 'gradle' # This automatically caches your ~/.gradle folder to speed up future builds!

      # Step C: The Windows Permission Fix
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step D: Compile the Java code and build the .jar file
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # Step E: Test the Dockerfile build
      - name: Test Docker Build
        run: docker build -t education-backend:test .