<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dead Bug 이메일 주소 변경 인증</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; color: #333;">

    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 5px;">
        <h1 style="color: #d9534f;">Dead Bug</h1>
        <h2>이메일 주소 변경 인증 코드</h2>
        <p>안녕하세요!</p>
        <p>회원님의 이메일 주소 변경 요청을 확인하기 위해 아래 인증 코드를 입력해 주세요.</p>
        <div style="background-color: #f5f5f5; padding: 15px; border-radius: 5px; font-size: 24px; letter-spacing: 5px; margin: 20px 0;">
            <strong th:text="${authCode}">123456</strong>
        </div>
        <p>이 코드는 3분 동안 유효합니다.</p>
        <p>만약 이메일 변경을 요청한 적이 없다면 이 메일을 무시해 주세요.</p>
        <hr>
        <p style="font-size: 12px; color: #777;">본 메일은 발신 전용입니다.</p>
    </div>

</body>
</html>
